name: reset dls

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@main
        with:
          fetch-depth: 1

      - name: Clear dl folder and strip dl raw links from Links.md
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dl
          shopt -s dotglob nullglob
          rm -rf dl/*

          tmp=$(mktemp)
          trap 'rm -f "$tmp"' EXIT
          if [ -f Links.md ]; then
            tail -n +4 Links.md | grep -Ev '/raw/[^)]*/dl/' > "$tmp" || true
          fi
          printf '%s\n' \
            '## 🔗 Direct Download Links' \
            '> Click on any link below to start downloading directly.<br><br/>' \
            '' > Links.md
          if [ -s "$tmp" ]; then
            cat "$tmp" >> Links.md
          fi

      - name: Push to Repository
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "NET-Sentinel Bot"
          git config user.email "224584266+NetSentinel-Bot@users.noreply.github.com"
          git add -A dl/ Links.md
          git -c committer.name="Diana-Cl" -c committer.email="135276904+Diana-Cl@users.noreply.github.com" \
            commit -m "Reset dl folder and strip dl links from Links.md [skip ci]" \
            || echo "No changes to commit"
          git push origin HEAD:"$BRANCH"
